<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Food Store</title>
    <link rel="stylesheet" href="../../../style.css" />
  </head>

  <body class="login-page">
    <main class="login-container">
      <section class="login-card">
        <div class="login-brand">
          <h1>🍔 Food Store</h1>
          <p>Ingresá a tu cuenta para continuar</p>
        </div>

        <form id="form" class="login-form">
          <div class="login-field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="off"
              placeholder="example@example.com"
            />
          </div>

          <div class="login-field">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="off"
              placeholder="********"
            />
          </div>

          <div class="login-field">
            <label for="rol">Rol</label>
            <select name="rol" id="rol">
              <option value="">Seleccione un rol</option>
              <option value="client">Cliente</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="login-button">Ingresar</button>

          <p class="login-demo">
            <strong>Demo:</strong>
            Cliente: cliente@food.com / cliente123
            <br />Admin: admin@admin.com / 123456
          </p>

          <p class="login-demo">
            ¿No tenés cuenta?
            <a href="../registro/registro.html">Registrate acá</a>
          </p>

        </form>
      </section>
    </main>

    <script type="module" src="./login.ts"></script>
  </body>
</html>
