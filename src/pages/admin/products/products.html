<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos</title>

  <link rel="stylesheet" href="../../../style.css" />
</head>

<body class="admin-page">

  <aside class="admin-sidebar">
    <h2>Food Store</h2>

    <nav>
      <a href="../home/home.html">Dashboard</a>

      <a href="../categories/categories.html">
        Categorías
      </a>

      <a href="./products.html" class="active">
        Productos
      </a>

      <a href="../orders/orders.html">
        Pedidos
      </a>
    </nav>
  </aside>

  <main class="admin-content">

    <header class="admin-header">
      <h1>Gestión de Productos</h1>

      <button id="logoutButton">
        Cerrar sesión
      </button>
    </header>

    <section class="table-header">
      <h2>Listado de productos</h2>

      <button id="new-product">
        + Nuevo producto
      </button>
    </section>

    <section id="products-container"></section>

    <div id="product-modal" class="admin-modal hidden">
      <div class="admin-modal-content">

        <button id="close-product-modal" class="modal-close">
          ✕
        </button>

        <h2 id="product-modal-title">Nuevo producto</h2>

        <form id="product-form">
          <input type="hidden" id="product-id">

          <label for="product-name">Nombre</label>
          <input type="text" id="product-name" required>

          <label for="product-description">Descripción</label>
          <textarea id="product-description" required></textarea>

          <label for="product-price">Precio</label>
          <input type="number" id="product-price" min="0" step="0.01" required>

          <label for="product-stock">Stock</label>
          <input type="number" id="product-stock" min="0" required>

          <label for="product-image">Imagen URL</label>
          <input type="text" id="product-image" required>

          <label for="product-category">Categoría</label>
          <select id="product-category" required></select>

          <label class="checkbox-row">
                <input type="checkbox" id="product-available">
                <span>Disponible</span>
            </label>

          <button type="submit">
            Guardar producto
          </button>
        </form>

      </div>
    </div>

  </main>

  <script type="module" src="./products.ts"></script>
</body>
</html>
