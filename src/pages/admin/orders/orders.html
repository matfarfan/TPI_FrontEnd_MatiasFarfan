<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>

    <link rel="stylesheet" href="../../../style.css">
</head>

<body class="admin-page">

    <aside class="admin-sidebar">

        <h2>Food Store</h2>

        <nav>

            <a href="../home/home.html">
                Dashboard
            </a>

            <a href="../categories/categories.html">
                Categorías
            </a>

            <a href="../products/products.html">
                Productos
            </a>

            <a href="./orders.html" class="active">
                Pedidos
            </a>

        </nav>

    </aside>

    <main class="admin-content">

        <header class="admin-header">

            <h1>Gestión de Pedidos</h1>

            <button id="logoutButton">
                Cerrar sesión
            </button>

        </header>

        <section class="table-header">

            <h2>Listado de pedidos</h2>

            <div class="table-actions">
                <label for="order-status-filter">
                    Filtrar por estado
                </label>

                <select id="order-status-filter">
                    <option value="TODOS">Todos</option>
                    <option value="PENDIENTE">Pendiente</option>
                    <option value="EN_PREPARACION">En preparación</option>
                    <option value="ENTREGADO">Entregado</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
            </div>

        </section>

        <section id="orders-container">

        </section>

        <div id="order-detail-modal" class="admin-modal hidden">
            <div class="admin-modal-content">

                <button id="close-order-detail-modal" class="modal-close">
                    ✕
                </button>

                <h2>Detalle del pedido</h2>

                <section id="order-detail-content">
                </section>

            </div>
        </div>

        <div id="status-modal" class="admin-modal hidden">
            <div class="admin-modal-content status-modal-content">
                <button id="close-status-modal" class="modal-close">
                ✕
                </button>

                <h2>Cambiar estado del pedido</h2>

                <p id="status-modal-text"></p>

                <div class="status-modal-actions">
                <button id="advance-status-button" type="button">
                    Avanzar estado
                </button>

                <button id="cancel-order-button" type="button">
                    Cancelar pedido
                </button>
                </div>
            </div>
        </div>
        
    </main>

    <script type="module" src="./orders.ts"></script>

</body>

</html>
